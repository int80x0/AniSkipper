name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint extension manifest and package
        shell: pwsh
        run: |
          npx --yes web-ext lint --source-dir . --warnings-as-errors

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content manifest.json -Raw | ConvertFrom-Json
          "value=$($manifest.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Firefox package (.xpi)
        shell: pwsh
        run: |
          ./build-xpi.ps1 -OutputDir ".\dist"

      - name: Build Chrome/Opera package (.zip)
        shell: pwsh
        run: |
          ./build-chrome.ps1 -OutputDir ".\dist"

      - name: Upload tag artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: AniSkipper-${{ github.ref_name }}-artifacts
          path: |
            dist/AniSkipper-firefox-${{ steps.version.outputs.value }}.xpi
            dist/AniSkipper-chrome-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error
          retention-days: 30

      - name: Prepare latest artifact names
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "dist/AniSkipper-firefox-${{ steps.version.outputs.value }}.xpi" -Destination "dist/AniSkipper-firefox-latest.xpi" -Force
          Copy-Item -LiteralPath "dist/AniSkipper-chrome-${{ steps.version.outputs.value }}.zip" -Destination "dist/AniSkipper-chrome-latest.zip" -Force

      - name: Move latest tag to current commit
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa aniskipper-latest -m "AniSkipper latest prerelease" $env:GITHUB_SHA
          git push origin refs/tags/aniskipper-latest --force

      - name: Clean old latest assets
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assetNames = @(
            gh release view aniskipper-latest --repo $env:GITHUB_REPOSITORY --json assets --jq ".assets[].name" 2>$null |
            Where-Object { $_ -and $_.Trim().Length -gt 0 }
          )

          if ($LASTEXITCODE -ne 0) {
            Write-Output "No existing latest release to clean."
            exit 0
          }

          foreach ($assetName in $assetNames) {
            gh release delete-asset aniskipper-latest $assetName --repo $env:GITHUB_REPOSITORY --yes
          }

      - name: Publish latest prerelease
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aniskipper-latest
          target_commitish: ${{ github.sha }}
          name: AniSkipper Latest
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            dist/AniSkipper-firefox-latest.xpi
            dist/AniSkipper-chrome-latest.zip

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AniSkipper ${{ github.ref_name }}
          prerelease: false
          overwrite_files: true
          files: |
            dist/AniSkipper-firefox-${{ steps.version.outputs.value }}.xpi
            dist/AniSkipper-chrome-${{ steps.version.outputs.value }}.zip
